services:
  score-table:
    image: score-table:0.1.0
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
      DB_PATH: "/data/app.db"
      CONFIG_PATH: "/config/teams.yaml"
    volumes:
      - ./data:/data
      - type: bind
        source: ./config/teams.yaml
        target: /config/teams.yaml
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

